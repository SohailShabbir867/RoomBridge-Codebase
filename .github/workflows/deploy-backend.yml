name: Deploy RoomBridge Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'roombridge-backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: roombridge-backend/package-lock.json

      - name: 📦 Install production dependencies
        working-directory: roombridge-backend
        run: npm ci --omit=dev

      - name: 🔑 Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🚀 Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'roombridge-api'
          package: ${{ github.workspace }}/roombridge-backend

      - name: 🔓 Logout from Azure
        run: az logout
        if: always()
