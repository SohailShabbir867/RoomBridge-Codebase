<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="#1A3A5C"/>

  <!-- Roof -->
  <polygon points="32,9 57,31 7,31" fill="#4A9FD4"/>

  <!-- Roof ridge cap -->
  <polygon points="32,9 57,31 52,31 32,14 12,31 7,31" fill="#5BAED6"/>

  <!-- House walls -->
  <rect x="11" y="31" width="42" height="24" fill="#F0F6FC"/>

  <!-- Left window -->
  <rect x="14" y="34" width="10" height="9" rx="2" fill="#4A9FD4"/>
  <line x1="19" y1="34" x2="19" y2="43" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="14" y1="38.5" x2="24" y2="38.5" stroke="#1A3A5C" stroke-width="1"/>

  <!-- Right window -->
  <rect x="40" y="34" width="10" height="9" rx="2" fill="#4A9FD4"/>
  <line x1="45" y1="34" x2="45" y2="43" stroke="#1A3A5C" stroke-width="1"/>
  <line x1="40" y1="38.5" x2="50" y2="38.5" stroke="#1A3A5C" stroke-width="1"/>

  <!-- Door (arch top) -->
  <path d="M27,55 L27,43 A5,5 0 0,1 37,43 L37,55 Z" fill="#1A3A5C"/>

  <!-- Door knob -->
  <circle cx="35" cy="49" r="1.2" fill="#4A9FD4"/>

  <!-- Bridge / ground line -->
  <rect x="0" y="55" width="64" height="9" rx="0" fill="#15304D"/>

  <!-- Bridge arch left -->
  <path d="M4,64 Q16,53 28,64" fill="#1A3A5C" stroke="#4A9FD4" stroke-width="1.5"/>
  <!-- Bridge arch right -->
  <path d="M36,64 Q48,53 60,64" fill="#1A3A5C" stroke="#4A9FD4" stroke-width="1.5"/>
</svg>